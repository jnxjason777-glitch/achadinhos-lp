<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Suporte ao Cliente</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; padding: 40px 20px; max-width: 600px; margin: 0 auto; color: #333; background: #f9f9f9; }
        .contact-container { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        p { color: #666; margin-bottom: 24px; }
        .contact-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; justify-content: center; font-weight: 600; color: #444; }
        .contact-item i { color: #fe2c55; }
        .back-link { display: inline-block; margin-top: 40px; background: #fe2c55; color: #fff; text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; transition: 0.3s; }
        .back-link:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>📞 Central de Atendimento</h1>
        <p>Estamos à disposição para tirar todas as suas dúvidas sobre pedidos, produtos ou entregas.</p>
        
        <div class="contact-item">
            <i data-lucide="mail"></i>
            <span>contato@achadinhosdavitrine.com</span>
        </div>
        
        <div class="contact-item">
            <i data-lucide="phone"></i>
            <span>(11) 92550-2137</span>
        </div>
        
        <div class="contact-item">
            <i data-lucide="clock"></i>
            <span>Segunda a Sexta: 09h às 18h</span>
        </div>

        <p style="font-size: 14px; margin-top: 30px;">CNPJ: 32.882.176/0001-00<br>Rua 25 de Março, 641 - Loja 11 - Centro, São Paulo/SP</p>
        
        <a href="index.html" class="back-link">Voltar para a Loja</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
